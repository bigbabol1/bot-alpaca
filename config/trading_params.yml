# Trading bot runtime parameters — hot-reloaded every 5s (no restart required)
# Schema validated on load; invalid config reverts to previous values.

risk_profile: aggressive  # conservative | moderate | aggressive

# News pipeline
news:
  finbert_threshold: 0.3       # Only forward to Ollama if abs(sentiment) > this
  batch_size: 5                # News items per Ollama call
  recency_intraday_hours: 4    # Discard news older than this for intraday signals
  recency_swing_hours: 48      # Discard news older than this for swing signals

# Signal queue
signals:
  intraday_stale_minutes: 15   # Discard intraday signals older than this at market open
  swing_queue_hours: 4         # Max hours to hold swing signals waiting for market open

# Market data cache
market_data:
  refresh_interval_minutes: 15  # How often to refresh OHLCV / ATR cache

# Position monitor
position_monitor:
  crypto_poll_seconds: 30       # Poll crypto positions for manual stop-loss
