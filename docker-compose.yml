services:
  bot:
    build: .
    container_name: alpaca-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot_data:/app/data    # SQLite persistence + .live_mode_confirmed gate
      - bot_logs:/app/logs    # Structured JSON logs
      - ./config:/app/config  # Hot-reload: edit on NAS, bot picks up within 5s
    environment:
      # Ollama on the GPU machine — reachable from NAS via LAN
      - OLLAMA_HOST=http://192.168.0.66:11434
    extra_hosts:
      # Lets the container reach the NAS host at host.docker.internal if needed
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      # Dashboard — bind to LAN only (not 0.0.0.0) for safety
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  bot_data:
  bot_logs:
